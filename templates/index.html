<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Risk Predictor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', sans-serif;
        }

        .app-title {
            color: #e8f1f5;
            font-size: 2.7rem;
            font-weight: 800;
            text-align: center;
            margin-top: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #cfdde5;
            margin-bottom: 2.5rem;
        }

        .form-card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 18px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label {
            font-weight: 600;
            color: #2c3e50;
        }

        .btn-predict {
            background: linear-gradient(90deg, #1e88e5, #26c6da);
            color: white;
            font-weight: 700;
            font-size: 1.15rem;
            border-radius: 12px;
            padding: 0.7rem;
            border: none;
        }

        .btn-predict:hover {
            background: linear-gradient(90deg, #26c6da, #1e88e5);
            transform: translateY(-1px);
        }

        .result-card {
            margin-top: 2rem;
            padding: 1.8rem;
            border-radius: 15px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .low-risk {
            background: #e6f4ea;
            color: #0f5132;
            border-left: 6px solid #198754;
        }

        .high-risk {
            background: #fbeaea;
            color: #842029;
            border-left: 6px solid #dc3545;
        }

        .risk-icon {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }

        footer {
            text-align: center;
            color: #b0c4cf;
            margin-top: 2rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="app-title">🩺 Heart Disease Risk Predictor</div>
    <div class="subtitle">AI-based cardiovascular health assessment</div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="form-card">

                <form method="POST">

                    <!-- Age & Gender -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label>Age (years)</label>
                            <input type="number" class="form-control" name="age" required>
                        </div>
                        <div class="col-md-6">
                            <label>Gender</label>
                            <select class="form-select" name="gender">
                                <option value="0">Female</option>
                                <option value="1">Male</option>
                            </select>
                        </div>
                    </div>

                    <!-- Height & Weight -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label>Height (cm)</label>
                            <input type="number" class="form-control" name="height" required>
                        </div>
                        <div class="col-md-6">
                            <label>Weight (kg)</label>
                            <input type="number" class="form-control" name="weight" required>
                        </div>
                    </div>

                    <!-- BP -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label>Systolic BP</label>
                            <input type="number" class="form-control" name="ap_hi" required>
                        </div>
                        <div class="col-md-6">
                            <label>Diastolic BP</label>
                            <input type="number" class="form-control" name="ap_lo" required>
                        </div>
                    </div>

                    <!-- Labs -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label>Cholesterol</label>
                            <select class="form-select" name="cholesterol">
                                <option value="1">Normal</option>
                                <option value="2">Above Normal</option>
                                <option value="3">High</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label>Glucose</label>
                            <select class="form-select" name="gluc">
                                <option value="1">Normal</option>
                                <option value="2">Above Normal</option>
                                <option value="3">High</option>
                            </select>
                        </div>
                    </div>

                    <!-- Lifestyle -->
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <label>Smoke</label>
                            <select class="form-select" name="smoke">
                                <option value="0">No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label>Alcohol</label>
                            <select class="form-select" name="alco">
                                <option value="0">No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label>Physically Active</label>
                            <select class="form-select" name="active">
                                <option value="1">Yes</option>
                                <option value="0">No</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-predict w-100">
                        🔍 Analyze Heart Risk
                    </button>
                </form>

                {% if result %}
                <div class="result-card {% if 'NO' in result %}low-risk{% else %}high-risk{% endif %}">
                    <div class="risk-icon">
                        {% if 'NO' in result %}✅{% else %}⚠️{% endif %}
                    </div>
                    {{ result }}
                </div>
                {% endif %}

            </div>
        </div>
    </div>

    <footer>
        ⚠️ This tool is for educational purposes only. Not a medical diagnosis.
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
